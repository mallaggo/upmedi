<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서비스 점검 중</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: "Malgun Gothic", sans-serif;
            background:#f5f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:#333;
        }

        .card{
            background:white;
            padding:60px 50px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.08);
            text-align:center;
            max-width:650px;
            width:90%;
        }

        .icon{
            font-size:70px;
            margin-bottom:25px;
        }

        h1{
            font-size:38px;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            line-height:1.8;
            color:#666;
        }

        .notice{
            margin-top:35px;
            padding:18px;
            background:#eef5ff;
            border-radius:12px;
            color:#1d4ed8;
            font-weight:bold;
        }

        footer{
            margin-top:40px;
            font-size:14px;
            color:#999;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">🚧</div>

    <h1>사이트 공사 중입니다.</h1>

    <p>
        보다 나은 서비스를 제공하기 위해<br>
        현재 시스템을 점검하고 있습니다.
    </p>

    <div class="notice">
        잠시 후 다시 방문해 주세요.
    </div>

    <footer>
        감사합니다.
    </footer>

</div>

</body>
</html>
