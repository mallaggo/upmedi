<!DOCTYPE html>
<html lang="ko" xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT 실습실</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Arial, sans-serif;
}

/* =========================
   상단 헤더
========================= */

.header{
    height:60px;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#f8f9fa;
}

.header a{
    text-decoration:none;
    color:#333;
    font-weight:bold;
}

.user-info{
    font-size:14px;
}

/* =========================
   본문
========================= */

.main-container{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* =========================
   왼쪽 대화목록
========================= */

.sidebar{
    width:260px;
    border-right:1px solid #ddd;
    background:#fafafa;
    padding:15px;
    overflow-y:auto;
}

.new-chat{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    cursor:pointer;
    font-weight:bold;
}

.chat-item{
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    margin-bottom:10px;
    cursor:pointer;
}

.chat-item:hover{
    background:#f0f0f0;
}

/* =========================
   오른쪽 GPT 영역
========================= */

.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-area{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:white;
}

.message{
    margin-bottom:20px;
}

.user{
    text-align:right;
}

.user span{
    display:inline-block;
    max-width:70%;
    padding:12px;
    background:#2563eb;
    color:white;
    border-radius:12px;
    white-space: pre-wrap;
}

.gpt span{
    display:inline-block;
    max-width:70%;
    padding:12px;
    background:#f3f4f6;
    color:#111827;
    border-radius:12px;
    border:1px solid #d1d5db;
    white-space: pre-wrap;
}

/* =========================
   입력 영역
========================= */

.input-area{
    height:140px;
    border-top:1px solid #ddd;
    display:flex;
    gap:10px;
    padding:10px;
    background:white;
}

.input-area textarea{
    flex:1;
    resize:none;
    padding:12px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

.input-buttons{
    width:90px;
    display:flex;
    flex-direction:column;
    gap:8px;
    height:100%;
}

#sendBtn{
    flex:2;
    font-size:15px;
    cursor:pointer;
}

#uploadBtn{
    flex:1;
    font-size:13px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- 상단 -->

<div class="header">

    <div>
         <a href="{% url 'blog:index' %}" >처음으로 돌아가기</a>
    </div>

    <div class="user-info">
        로그인 사용자 :
        <strong>{{ request.user.username }}</strong>
    </div>

</div>

<!-- 본문 -->

<div class="main-container">

    <!-- 왼쪽 -->

    <div class="sidebar">

        <button class="new-chat">
            + 새 대화
        </button>

        <div class="chat-item">
            ERP 질문
        </div>

        <div class="chat-item">
            엑셀 함수
        </div>

        <div class="chat-item">
            파이썬 실습
        </div>

    </div>

    <!-- 오른쪽 -->

<div class="chat-container">

        <div class="chat-area" id="chatArea">
         {% if messages %}
            {% for msg in messages %}
                {% if msg.role == "user" %}
                <div class="message user">
                {% else %}
                <div class="message gpt">
                {% endif %}
                <span>{{ msg.content }}</span>
                </div>
            {% endfor %}
            {% endif %}
        </div>

        <!-- 입력창 -->

        <div class="input-area">

        <textarea
        id="question"
        rows="4"
        placeholder="질문을 입력하세요...">
        </textarea>

            <div class="input-buttons">

                <button id="sendBtn">
                    전송
                </button>

                <input
                    type="file"
                    id="fileUpload"
                    hidden>

                <button id="uploadBtn">
                    파일 업로드
                </button>

            </div>

        </div>

    </div>

</div>

<script>

document.getElementById("uploadBtn")
.addEventListener("click", function(){

    document.getElementById("fileUpload").click();

});

</script>



<script>

document.getElementById("sendBtn")
.addEventListener("click", async function(){

    const question =
        document.getElementById("question").value;

    if(!question.trim()){
        return;
    }

    const chatArea =
        document.getElementById("chatArea");

    // 사용자 질문 먼저 출력

    chatArea.innerHTML += `
        <div class="message user">
            <span>${question}</span>
        </div>
    `;

    // GPT 대기 메시지 출력

    chatArea.innerHTML += `
        <div class="message gpt" id="loadingMessage">
            <span>GPT 답변 생성 중...</span>
        </div>
    `;

    document.getElementById("question").value = "";

    chatArea.scrollTop =
        chatArea.scrollHeight;

    try {

        const response = await fetch(
            "/gpt/ask/",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "X-CSRFToken":"{{ csrf_token }}"
                },

                body:JSON.stringify({
                    question:question
                })
            }
        );

        const data = await response.json();

        // 대기 메시지를 실제 답변으로 교체

        document.getElementById("loadingMessage")
            .outerHTML = `
            <div class="message gpt">
                <span>${data.answer}</span>
            </div>
        `;

    } catch(error){

        document.getElementById("loadingMessage")
            .outerHTML = `
            <div class="message gpt">
                <span>오류가 발생했습니다.</span>
            </div>
        `;

        console.error(error);
    }

    chatArea.scrollTop =
        chatArea.scrollHeight;

});


document.getElementById("question")
.addEventListener("keydown", function(e){

    // Enter
    if(e.key === "Enter" && !e.shiftKey){

        e.preventDefault();

        document.getElementById("sendBtn").click();
    }

});
</script>

</body>
</html>
