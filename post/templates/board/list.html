{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container mt-5" style="max-width: 900px;">


<!-- 제목 -->
<div class="text-center mb-5">
    <h2 class="text-primary">문의 게시판</h2>
    <hr style="width: 60px; margin: auto;">
</div>

<!-- 게시글 리스트 카드 -->
<div class="card shadow-sm">
    <div class="card-body p-0">

        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light text-center">
                <tr>
                    <th class="text-start ps-4">제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                </tr>
            </thead>

            <tbody>
            {% for post in posts %}
                <tr>
                    <td class="text-start ps-4">
                        <a href="{% url 'post:post_detail' post.pk %}" class="text-decoration-none fw-semibold">
                            {{ post.title }}
                        </a>
                    </td>
                    <td>{{ post.author.username }}</td>
                    <td class="text-muted">
                        {{ post.created_at|date:"Y-m-d" }}
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted py-4">
                        게시글이 없습니다.
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>
</div>

<!-- 버튼 영역 -->
<div class="d-flex justify-content-between mt-4">

    <!-- (선택) 검색 -->
    <form method="get" class="d-flex">
        <input type="text" name="q" class="form-control me-2" placeholder="검색">
        <button class="btn btn-primary">검색</button>
    </form>

    <!-- 글쓰기 -->
    {% if user.is_authenticated %}
    <a href="{% url 'post:post_create' %}" class="btn btn-primary">
        ✏️ 글 작성
    </a>
    {% endif %}

</div>


</div>

{% endblock %}
